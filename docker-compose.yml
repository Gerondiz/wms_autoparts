# Docker Compose для WMS Autoparts
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: wms_autoparts_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: wms_autoparts
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d wms_autoparts"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - wms_network

  # Next.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - NODE_ENV=production
    container_name: wms_autoparts_app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      # Внутри Docker сети используем имя сервиса postgres
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/wms_autoparts
      - AUTH_SECRET=${AUTH_SECRET:-your-secret-key-here-generate-with-openssl-rand-base64-32}
      - AUTH_URL=http://localhost:3000
      - NEXT_PUBLIC_APP_NAME=WMS Autoparts
      - NEXT_PUBLIC_DEFAULT_LOCALE=ru
      - UPLOAD_DIR=/app/public/uploads
      - MAX_FILE_SIZE=5242880
    ports:
      - "3000:3000"
    volumes:
      - app_uploads:/app/public/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - wms_network

volumes:
  postgres_data:
    driver: local
  app_uploads:
    driver: local

networks:
  wms_network:
    driver: bridge
