name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '20'
  DATABASE_URL: 'postgresql://postgres:postgres@localhost:5432/wms_autoparts_test?schema=public'
  AUTH_SECRET: 'test-secret-key-for-ci-environment-12345678'
  AUTH_URL: 'http://localhost:3000'
  NEXT_PUBLIC_APP_NAME: 'WMS Autoparts Test'
  NEXT_PUBLIC_DEFAULT_LOCALE: 'ru'

jobs:
  # ============================================
  # Unit и интеграционные тесты
  # ============================================
  unit-tests:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wms_autoparts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Run unit tests
        run: npm run test -- --coverage
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          CI: true

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results
          path: coverage/junit.xml

  # ============================================
  # E2E тесты
  # ============================================
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wms_autoparts_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        env:
          PLAYWRIGHT_BROWSERS_PATH: /tmp/playwright-browsers

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Seed test data
        run: npm run db:seed
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          AUTH_URL: ${{ env.AUTH_URL }}

      - name: Run E2E tests
        run: npx playwright test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          AUTH_URL: ${{ env.AUTH_URL }}
          BASE_URL: 'http://localhost:3000'
          CI: true

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: playwright-report/junit.xml

  # ============================================
  # Тесты на разных браузерах (матрица)
  # ============================================
  e2e-matrix:
    name: E2E Matrix
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]
        include:
          - browser: chromium
            name: Chrome
          - browser: firefox
            name: Firefox
          - browser: webkit
            name: Safari

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wms_autoparts_test
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps ${{ matrix.browser }}
        env:
          PLAYWRIGHT_BROWSERS_PATH: /tmp/playwright-browsers

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}

      - name: Run E2E tests (${{ matrix.name }})
        run: npx playwright test --project=${{ matrix.browser }}
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ matrix.browser }}
          path: playwright-report/
          retention-days: 7

  # ============================================
  # Мобильные E2E тесты
  # ============================================
  e2e-mobile:
    name: E2E Mobile Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: wms_autoparts_test
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: /tmp/playwright-browsers

      - name: Run database migrations
        run: npm run db:push
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - name: Build application
        run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}

      - name: Run mobile E2E tests
        run: npx playwright test --project="Mobile Chrome" --project="Mobile Safari"
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          AUTH_SECRET: ${{ env.AUTH_SECRET }}
          CI: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-mobile
          path: playwright-report/
          retention-days: 7

  # ============================================
  # Сводный результат
  # ============================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [unit-tests, e2e-tests, e2e-matrix, e2e-mobile]
    if: always()

    steps:
      - name: Check test results
        run: |
          echo "=== Test Results Summary ==="
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "E2E Tests: ${{ needs.e2e-tests.result }}"
          echo "E2E Matrix: ${{ needs.e2e-matrix.result }}"
          echo "E2E Mobile: ${{ needs.e2e-mobile.result }}"

      - name: Fail if any tests failed
        if: contains(needs.*.result, 'failure')
        run: exit 1
